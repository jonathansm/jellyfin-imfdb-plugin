<!DOCTYPE html>
<html>
<head>
    <title>IMFDB</title>
</head>
<body>
    <div id="ImfdbConfigPage" data-role="page" class="page type-interior pluginConfigurationPage">
        <div data-role="content">
            <div class="content-primary">
                <form id="ImfdbConfigForm">
                    <div class="sectionTitleContainer flex align-items-center">
                        <h2 class="sectionTitle">IMFDB</h2>
                    </div>
                    <p>IMFDB can enrich movie and series metadata during metadata refreshes. This uses normal Jellyfin fields, so no Jellyfin Web script injection is required.</p>
                    <div class="inputContainer">
                        <label>
                            <input is="emby-checkbox" type="checkbox" id="EnableLookups" />
                            <span>Enable IMFDB lookups</span>
                        </label>
                    </div>
                    <div class="inputContainer">
                        <label>
                            <input is="emby-checkbox" type="checkbox" id="AddFirearmsToOverview" />
                            <span>Add an IMFDB Firearms section to item overviews</span>
                        </label>
                    </div>
                    <div class="inputContainer">
                        <label>
                            <input is="emby-checkbox" type="checkbox" id="AddFirearmTags" />
                            <span>Add searchable firearm tags</span>
                        </label>
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="MaxFirearms">Maximum firearms per item</label>
                        <input is="emby-input" type="number" min="1" max="100" id="MaxFirearms" />
                    </div>
                    <button is="emby-button" type="submit" class="raised button-submit block">
                        <span>Save</span>
                    </button>
                </form>
            </div>
        </div>
        <script type="text/javascript">
            (function () {
                const pluginId = '0282b499-528f-4185-a301-0a0c333139a7';

                document.querySelector('#ImfdbConfigPage')
                    .addEventListener('pageshow', function () {
                        Dashboard.showLoadingMsg();
                        ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                            document.querySelector('#EnableLookups').checked = config.EnableLookups !== false;
                            document.querySelector('#AddFirearmsToOverview').checked = config.AddFirearmsToOverview !== false;
                            document.querySelector('#AddFirearmTags').checked = config.AddFirearmTags === true;
                            document.querySelector('#MaxFirearms').value = config.MaxFirearms || 20;
                            Dashboard.hideLoadingMsg();
                        });
                    });

                document.querySelector('#ImfdbConfigForm')
                    .addEventListener('submit', function (event) {
                        event.preventDefault();
                        Dashboard.showLoadingMsg();
                        ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                            config.EnableLookups = document.querySelector('#EnableLookups').checked;
                            config.AddFirearmsToOverview = document.querySelector('#AddFirearmsToOverview').checked;
                            config.AddFirearmTags = document.querySelector('#AddFirearmTags').checked;
                            config.MaxFirearms = parseInt(document.querySelector('#MaxFirearms').value || '20', 10);
                            ApiClient.updatePluginConfiguration(pluginId, config).then(Dashboard.processPluginConfigurationUpdateResult);
                        });
                    });
            })();
        </script>
    </div>
</body>
</html>
