name: Release

on:
  push:
    tags:
      - "v*.*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Package plugin
        id: package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash ./scripts/package-plugin.sh "${VERSION}"
          ZIP="artifacts/jellyfin-plugin-imfdb_${VERSION}.zip"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          echo "checksum=$(cat "${ZIP}.md5")" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.zip }}
            ${{ steps.package.outputs.zip }}.md5
          generate_release_notes: true

      - name: Update manifest for GitHub Pages
        shell: bash
        run: |
          VERSION="${{ steps.package.outputs.version }}"
          CHECKSUM="${{ steps.package.outputs.checksum }}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"
          SOURCE_URL="https://github.com/${OWNER}/${REPO}/releases/download/v${VERSION}/jellyfin-plugin-imfdb_${VERSION}.zip"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export VERSION CHECKSUM OWNER SOURCE_URL TIMESTAMP
          mkdir -p public
          python - <<'PY'
          import json
          import os

          version = os.environ["VERSION"]
          checksum = os.environ["CHECKSUM"]
          owner = os.environ["OWNER"]
          source_url = os.environ["SOURCE_URL"]
          timestamp = os.environ["TIMESTAMP"]

          with open("manifest.json", encoding="utf-8") as manifest_file:
              manifest = json.load(manifest_file)

          plugin = manifest[0]
          plugin["owner"] = owner
          versions = plugin.setdefault("versions", [])
          current = next((entry for entry in versions if entry.get("version") == version), None)
          if current is None:
              current = {
                  "version": version,
                  "changelog": "See the GitHub release notes for this version.",
                  "targetAbi": "10.11.0.0"
              }
              versions.insert(0, current)

          current["sourceUrl"] = source_url
          current["checksum"] = checksum
          current["timestamp"] = timestamp
          plugin["versions"] = sorted(versions, key=lambda entry: entry.get("version", ""), reverse=True)

          with open("public/manifest.json", "w", encoding="utf-8") as manifest_file:
              json.dump(manifest, manifest_file, indent=2)
              manifest_file.write("\n")
          PY

      - name: Deploy manifest to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
          clean: true
