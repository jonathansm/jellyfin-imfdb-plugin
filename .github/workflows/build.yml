name: Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.Imfdb.sln

      - name: Build
        run: dotnet build Jellyfin.Plugin.Imfdb.sln -c Release --no-restore

      - name: Publish
        run: dotnet publish Jellyfin.Plugin.Imfdb.sln -c Release --no-build

